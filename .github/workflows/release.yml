name: Release

# Build a release APK and publish a GitHub Release whenever a version tag is
# pushed, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
#
# The APK is signed with the debug key (the project default), which is fine for
# direct sideload distribution via GitHub Releases. The in-app updater points at
# this repo's releases/latest, so a new tag automatically prompts users.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.1.0
          NAME="${TAG#v}"                    # strip leading v -> 1.1.0
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Building version $NAME (+${GITHUB_RUN_NUMBER}) from tag $TAG"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Generate code (drift, etc.)
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # Build the APK with the version taken from the tag so the installed
      # app's version always equals the release tag (keeps the update check
      # honest — no drift between pubspec and the published release).
      - name: Build release APK
        run: >-
          flutter build apk --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ steps.version.outputs.code }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/veetubook-${{ steps.version.outputs.name }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the notes from the tag/commit if present; GitHub also
          # auto-generates a changelog from merged PRs/commits.
          generate_release_notes: true
          files: dist/veetubook-${{ steps.version.outputs.name }}.apk
