name: CI

# Analyze + test on every push to main and every pull request, so problems are
# caught before a release tag is cut.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Generate code (drift, etc.)
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
