<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="veetubook logo">
  <title>veetubook</title>
  <!-- App-icon tile -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2E7D32"/>
      <stop offset="1" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#tile)"/>

  <!-- House body -->
  <path d="M150 250 L256 156 L362 250 V372 a16 16 0 0 1 -16 16 H166 a16 16 0 0 1 -16 -16 Z"
        fill="#FFFFFF"/>

  <!-- Open book / ledger pages inside the house -->
  <path d="M186 300 h56 v66 h-56 a0 0 0 0 1 0 0 Z" fill="#E8F0E4"/>
  <path d="M270 300 h56 v66 h-56 Z" fill="#F7F8F6"/>
  <!-- Book spine -->
  <rect x="250" y="298" width="12" height="70" rx="4" fill="#2E7D32"/>
  <!-- Ledger lines (left page) -->
  <rect x="198" y="314" width="34" height="6" rx="3" fill="#B9CBB2"/>
  <rect x="198" y="330" width="34" height="6" rx="3" fill="#B9CBB2"/>
  <rect x="198" y="346" width="24" height="6" rx="3" fill="#B9CBB2"/>
  <!-- Ledger lines (right page) -->
  <rect x="280" y="314" width="34" height="6" rx="3" fill="#C9D4C3"/>
  <rect x="280" y="330" width="34" height="6" rx="3" fill="#C9D4C3"/>
  <rect x="280" y="346" width="24" height="6" rx="3" fill="#C9D4C3"/>

  <!-- Amber "bought" checkmark badge on the roof -->
  <circle cx="256" cy="196" r="40" fill="#F9A825"/>
  <path d="M238 196 l12 13 l22 -26" stroke="#1B5E20" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
